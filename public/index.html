<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data:;">
    <title>Sony Factory Tour Login</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="container">
        <div class="text-section">
            <h1 class="brand-title" data-text="SONY">SONY</h1>
            <h2 class="welcome-text">Welcome</h2>
            <p class="subtitle">to the</p>
            <h2 class="tour-text">Factory Tour</h2>
        </div>

        <div class="form-section">
            <div class="login-card">
                <div class="circle-icon">
                    <div class="inner-circle"></div>
                </div>
                
                <form id="loginForm">
                    <input type="text" id="username" placeholder="Username" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit" class="login-btn">LOGIN</button>
                </form>
                <p id="message"></p>
            </div>
        </div>
    </div>

    <script src="js/Login.js"></script>
</body>
</html>
